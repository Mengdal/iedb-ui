name: Build Front

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build front site
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Create front.zip
        run: |
          cd dist
          zip -r ../front.zip .
          cd ..

      - name: Upload front.zip
        uses: actions/upload-artifact@v4
        with:
          name: front-${{ github.ref_name }}
          path: front.zip
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: front.zip
          token: ${{ secrets.GITHUB_TOKEN }}
